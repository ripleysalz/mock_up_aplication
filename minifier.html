<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mockup Website</title><style> :root { --bg-color: #1a1a1a; --panel-bg: #2d2d2d; --border-color: #444; --text-color: #e0e0e0; --btn-bg: #333; --btn-hover: #4a4a4a; } body { background-color: var(--bg-color); color: var(--text-color); font-family: monospace; padding: 20px; } .chain-container { display: flex; width: 600px; height: 150px; background: var(--panel-bg); border: 1px solid var(--border-color); margin-bottom: 20px; } .panel-io { flex: 2; display: flex; padding: 5px; } .panel-io textarea { width: 100%; height: 100%; background: #1e1e1e; color: #a9dc76; border: 1px solid var(--border-color); resize: none; font-family: monospace; font-size: 12px; padding: 5px; box-sizing: border-box; white-space: pre; } .panel-controls { flex: 1; display: flex; flex-direction: column; padding: 5px 0; gap: 5px; } button { flex: 1; background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--border-color); cursor: pointer; font-family: monospace; font-size: 12px; } button:hover:not(:disabled) { background: var(--btn-hover); } button:disabled { opacity: 0.5; cursor: not-allowed; } </style></head><body><div class="chain-container"><div class="panel-io"><textarea id="params-1" placeholder="params-1"></textarea></div><div class="panel-controls"><button id="wipe-1">wipe-1</button><button id="data-1">data-1</button><button id="read-1">read-1</button><button id="exec-1" disabled>exec-1</button></div><div class="panel-io" style="flex: 3;"><textarea id="grid-1" placeholder="grid" readonly></textarea></div></div><div class="chain-container"><div class="panel-io"><textarea id="params-2" placeholder="color codes"></textarea></div><div class="panel-controls"><button id="wipe-2">wipe-2</button><button id="data-2">data-2</button><button id="read-2">read-2</button><button id="exec-2" disabled>exec-2</button></div><div class="panel-io" style="flex: 3; background: #000;"><canvas id="canvas-2" style="width: 100%; height: 100%; image-rendering: pixelated;"></canvas></div></div><div class="chain-container" style="height: 200px;"><div class="panel-io"><textarea id="params-3" placeholder="XMIN 0&#10;YMIN 0&#10;XMAX 4&#10;YMAX 4"></textarea></div><div class="panel-controls"><button id="wipe-3">wipe-3</button><button id="data-3">data-3</button><button id="read-3">read-3</button><button id="exec-3" disabled>exec-3</button></div><div class="panel-io" style="flex: 3; background: #000;"><canvas id="canvas-3" style="width: 100%; height: 100%; image-rendering: pixelated;"></canvas></div></div><script> let parsedParams = {}; document.getElementById('wipe-1').addEventListener('click', () => { document.getElementById('params-1').value = ''; document.getElementById('grid-1').value = ''; document.getElementById('exec-1').disabled = true; parsedParams = {}; }); document.getElementById('data-1').addEventListener('click', () => { const defaultData = "COLS 10\nROWS 10\nUMIN 0.20\nUMAX 0.70\nUNUM 11\nSEPC ;"; document.getElementById('params-1').value = defaultData; }); document.getElementById('read-1').addEventListener('click', () => { const text = document.getElementById('params-1').value; const lines = text.split('\n'); lines.forEach(line => { const parts = line.trim().split(' '); if (parts.length >= 2) { parsedParams[parts[0]] = parts.slice(1).join(' '); } }); document.getElementById('exec-1').disabled = false; }); document.getElementById('exec-1').addEventListener('click', () => { const cols = parseInt(parsedParams['COLS']); const rows = parseInt(parsedParams['ROWS']); const umin = parseFloat(parsedParams['UMIN']); const umax = parseFloat(parsedParams['UMAX']); const unum = parseInt(parsedParams['UNUM']); const sepc = parsedParams['SEPC']; const possibleValues = []; if (unum > 1) { const step = (umax - umin) / (unum - 1); for (let i = 0; i < unum; i++) { possibleValues.push((umin + (i * step)).toFixed(2)); } } else { possibleValues.push(umin.toFixed(2)); } let gridText = ''; for (let r = 0; r < rows; r++) { let rowValues = []; for (let c = 0; c < cols; c++) { const randomIndex = Math.floor(Math.random() * possibleValues.length); rowValues.push(possibleValues[randomIndex]); } gridText += rowValues.join(sepc) + '\n'; } document.getElementById('grid-1').value = gridText.trim(); }); const palette = [ "#522","#622","#722","#822","#922","#a22","#b22","#c22", "#d22","#e22","#f22","#f44","#f66","#f88","#faa","#fcc" ]; let colorGridForCanvas = []; document.getElementById('wipe-2').addEventListener('click', () => { document.getElementById('params-2').value = ''; const canvas = document.getElementById('canvas-2'); canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); document.getElementById('exec-2').disabled = true; }); document.getElementById('data-2').addEventListener('click', () => { const rawData = document.getElementById('grid-1').value; if (!rawData) { alert("Data numerik di Panel 1 kosong!"); return; } const lines = rawData.trim().split('\n'); const rows = lines.map(l => l.split(';').map(Number)); let colorOutput = ""; rows.forEach(row => { let rowColors = row.map(val => { let index = Math.floor(val * 20); index = Math.max(0, Math.min(15, index)); return palette[index]; }); colorOutput += rowColors.join(';') + '\n'; }); document.getElementById('params-2').value = colorOutput.trim(); }); document.getElementById('read-2').addEventListener('click', () => { const colorText = document.getElementById('params-2').value; if (!colorText) return; colorGridForCanvas = colorText.trim().split('\n').map(line => line.split(';')); document.getElementById('exec-2').disabled = false; }); document.getElementById('exec-2').addEventListener('click', () => { const canvas = document.getElementById('canvas-2'); const ctx = canvas.getContext('2d'); const rows = colorGridForCanvas.length; const cols = colorGridForCanvas[0].length; canvas.width = cols; canvas.height = rows; for (let r = 0; r < rows; r++) { for (let c = 0; c < cols; c++) { ctx.fillStyle = colorGridForCanvas[r][c]; ctx.fillRect(c, r, 1, 1); } } }); let coordParams = {}; let startPos = {x: 0, y: 0}; let endPos = {x: 0, y: 0}; document.getElementById('wipe-3').addEventListener('click', () => { document.getElementById('params-3').value = ''; const canvas = document.getElementById('canvas-3'); canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); document.getElementById('exec-3').disabled = true; }); document.getElementById('data-3').addEventListener('click', () => { const cols = parsedParams['COLS'] || 5; const rows = parsedParams['ROWS'] || 5; const defaultCoords = `XMIN 0\nYMIN 0\nXMAX ${cols}\nYMAX ${rows}`; document.getElementById('params-3').value = defaultCoords; }); document.getElementById('read-3').addEventListener('click', () => { const text = document.getElementById('params-3').value; text.split('\n').forEach(line => { const [key, val] = line.trim().split(' '); coordParams[key] = parseInt(val); }); document.getElementById('exec-3').disabled = false; }); document.getElementById('exec-3').addEventListener('click', () => { const canvas3 = document.getElementById('canvas-3'); const ctx3 = canvas3.getContext('2d'); if (colorGridForCanvas.length === 0) { alert("Jalankan Panel 2 dulu untuk mendapatkan peta warna!"); return; } const rows = colorGridForCanvas.length; const cols = colorGridForCanvas[0].length; canvas3.width = cols; canvas3.height = rows; for (let r = 0; r < rows; r++) { for (let c = 0; c < cols; c++) { ctx3.fillStyle = colorGridForCanvas[r][c]; ctx3.fillRect(c, r, 1, 1); } } const xmin = coordParams['XMIN']; const xmax = coordParams['XMAX']; const ymin = coordParams['YMIN']; const ymax = coordParams['YMAX']; const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min; startPos = { x: randInt(xmin, xmax), y: randInt(ymin, ymax) }; do { endPos = { x: randInt(xmin, xmax), y: randInt(ymin, ymax) }; } while (endPos.x === startPos.x && endPos.y === startPos.y); ctx3.fillStyle = "#00ff00"; ctx3.fillRect(startPos.x, startPos.y, 1, 1); ctx3.fillStyle = "#00aaff"; ctx3.fillRect(endPos.x, endPos.y, 1, 1) console.log("Start:", startPos, "End:", endPos); }); </script></body></html>
