<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Medan Listrik & Gaya Coulomb</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121212; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #controls {
            position: absolute; top: 10px; left: 10px;
            background: rgba(30, 30, 30); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #444; backdrop-filter: blur(5px);
        }
        button {
            background-color: #333; color: white; border: 1px solid #555;
            padding: 8px 12px; margin: 5px; border-radius: 4px; cursor: pointer;
            transition: 0.2s; font-weight: bold;
        }
        button:hover { background-color: #555; }
        .btn-pos { border: 3px solid #ff4444; }
        .btn-neg { border: 3px solid #4488ff; }
        .legend { font-size: 12px; color: #ccc; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="controls">
        <h3 style="margin-top: 0; margin-bottom: 10px;">Kontrol Muatan</h3>
        <button class="btn-pos" onclick="addCharge(5)"> Tambah Muatan Positif</button>
        <button class="btn-neg" onclick="addCharge(-5)"> Tambah Muatan Negatif</button>
        <button onclick="clearCharges()">Bersihkan</button>
        
        <div class="legend">
            <strong>Legenda:</strong><br>
            Panah Grid: Medan Listrik (Biru = Lemah, Merah = Kuat)<br>
            Panah Kuning: Gaya Coulomb pada muatan
        </div>
    </div>

    <canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    }
    window.addEventListener('resize', resize);

    // State Muatan Awal 
    let charges = [
        { x: window.innerWidth * 0.5, y: window.innerHeight / 2, q: 5, radius: 10 }
    ];


    // Menggambar Panah Medan Listrik (Grid)
    function drawFieldArrow(x, y, ex, ey, magnitude) {
        const len = 16; 
        const angle = Math.atan2(ey, ex);
        
        // Pemetaan Warna (Biru -> Merah)
        // Logaritmik agar transisinya terlihat natural
        let logMag = Math.log10(magnitude * 400 + 1);
        let normalizedMag = Math.min(1, logMag / 3.5); // Nilai 0 sampai 1
        
        // Hue: 240 (Biru) berkurang menjadi 0 (Merah)
        let hue = (1 - normalizedMag) * 240; 
        let opacity = Math.min(1, 0.1 + normalizedMag); // Makin redup jika sangat jauh
        
        ctx.strokeStyle = `hsla(${hue}, 100%, 50%, ${opacity})`;
        ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${opacity})`;
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.moveTo(x - Math.cos(angle) * len/2, y - Math.sin(angle) * len/2);
        ctx.lineTo(x + Math.cos(angle) * len/2, y + Math.sin(angle) * len/2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * len/2, y + Math.sin(angle) * len/2);
        ctx.lineTo(
            x + Math.cos(angle) * len/2 - 5 * Math.cos(angle - Math.PI / 6),
            y + Math.sin(angle) * len/2 - 5 * Math.sin(angle - Math.PI / 6)
        );
        ctx.lineTo(
            x + Math.cos(angle) * len/2 - 5 * Math.cos(angle + Math.PI / 6),
            y + Math.sin(angle) * len/2 - 5 * Math.sin(angle + Math.PI / 6)
        );
        ctx.fill();
    }


    // Render Utama
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const spacing = 35;
        const k_field = 1000; // Konstanta untuk visualisasi medan

        // Gambar Medan Vektor (Grid)
        for (let x = spacing/2; x < canvas.width; x += spacing) {
            for (let y = spacing/2; y < canvas.height; y += spacing) {
                let ex = 0, ey = 0;

                for (let c of charges) {
                    let dx = x - c.x;
                    let dy = y - c.y;
                    let r2 = dx*dx + dy*dy;
                    
                    if (r2 > 50) { 
                        let r = Math.sqrt(r2);
                        let eMag = (k_field * c.q) / r2;
                        ex += eMag * (dx / r);
                        ey += eMag * (dy / r);
                    }
                }

                let totalMagnitude = Math.hypot(ex, ey);
                if (totalMagnitude > 0.005) {
                    drawFieldArrow(x, y, ex, ey, totalMagnitude);
                }
            }
        }

        // Gambar Muatan & Gaya Coulombnya
        for (let i = 0; i < charges.length; i++) {
            let c = charges[i];
            // Gambar lingkaran muatan
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
            ctx.fillStyle = c.q > 0 ? '#ff4444' : '#4488ff';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    resize();
</script>
</body>
</html>
